changelog:
  exclude:
    labels:
      - skip-changelog
  categories:
    - title: Features
      labels:
        - feature
        - enhancement
    - title: Fixes
      labels:
        - bug
        - fix
    - title: Security
      labels:
        - security
    - title: Dependencies
      labels:
        - dependencies
        - dependency
        - deps
    - title: Documentation
      labels:
        - documentation
        - docs
    - title: Other changes
      labels:
        - '*'
